name: CI

on:
  push:
    branches: [ "main" ]
    paths:
      - '**/*.js'
  pull_request:
    branches: [ "main" ]
    paths:
      - '**/*.js'

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test
